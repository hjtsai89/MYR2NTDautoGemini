name: Daily Exchange Rate Scraper

on:
  schedule:
    # 台灣時間 09:30 AM (UTC 01:30)
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  build:
    # 修正點 1: 改用最新的 ubuntu-24.04 映像檔，內建 Node 24
    runs-on: ubuntu-24.04
    
    permissions:
      contents: write

    # 修正點 2: 直接在 Job 層級禁用棄用警告 (GitHub 官方暫時解決方案)
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 檢查代碼 (Checkout)
        uses: actions/checkout@v4.2.2

      - name: 設定 Python 環境
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: |
          pip install pandas requests lxml beautifulsoup4

      - name: 執行爬蟲腳本
        run: python scraper.py

      - name: 提交並儲存變更
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action Bot"
          git add exchange_rates.csv
          git commit -m "Auto Update: $(date)" || exit 0
          git push
