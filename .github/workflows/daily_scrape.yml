name: Daily Exchange Rate Scraper

on:
  schedule:
    # 台灣時間 09:30 AM
    - cron: '30 1 * * *'
  workflow_dispatch:

# 加入環境變數以消除 Node.js 20 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: 檢查代碼 (Checkout)
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: |
          pip install pandas requests lxml beautifulsoup4

      - name: 執行爬蟲腳本
        run: python scraper.py

      - name: 提交並儲存變更
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action Bot"
          git add exchange_rates.csv
          # 提交訊息也使用台灣時間 (由腳本產生的日期)
          git commit -m "Auto Update: $(date)" || exit 0
          git push
