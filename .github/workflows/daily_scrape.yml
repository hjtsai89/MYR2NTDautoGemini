name: Daily Exchange Rate Scraper

on:
  schedule:
    # 台灣時間 09:30 AM (UTC 01:30)
    - cron: '30 1 * * *'
  workflow_dispatch:

env:
  # 強制將 JavaScript Actions 提升至 Node24 執行
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      # 升級至 v4 (確保使用最新修補版本)
      - name: 檢查代碼 (Checkout)
        uses: actions/checkout@v4

      # 升級至 v5 (v5 已正式支援 Node 20+ 並最佳化 Node 24 相容性)
      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: |
          pip install pandas requests lxml beautifulsoup4

      - name: 執行爬蟲腳本
        run: python scraper.py

      - name: 提交並儲存變更
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action Bot"
          git add exchange_rates.csv
          git commit -m "Auto Update: $(date)" || exit 0
          git push
