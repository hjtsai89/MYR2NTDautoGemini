- name: 執行爬蟲腳本
        id: run_scraper  # 加入 ID 以便後續步驟讀取輸出
        run: python scraper.py

      - name: 提交並儲存變更
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action Bot"
          git add exchange_rates.csv
          
          # 使用 steps.<id>.outputs 取得 Python 傳出的變數
          # Commit 訊息會直接顯示匯率，例如：Auto Update [2026-04-09]: MYR/TWD = 7.1234
          git commit -m "Auto Update [${{ steps.run_scraper.outputs.update_time }}]: MYR/TWD = ${{ steps.run_scraper.outputs.myr_twd }}" || exit 0
          git push
