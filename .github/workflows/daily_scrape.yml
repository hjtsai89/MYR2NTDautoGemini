name: Daily Exchange Rate Scraper

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 檢查代碼 (Checkout)
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: pip install pandas requests lxml beautifulsoup4

      - name: 執行爬蟲腳本
        id: run_scraper # 重要：設定 ID 以供後續步驟讀取
        run: python scraper.py

      - name: 提交並儲存變更
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action Bot"
          git add exchange_rates.csv
          
          # 直接在 Commit 訊息中顯示匯率結果
          git commit -m "Auto Update [${{ steps.run_scraper.outputs.update_time }}]: MYR/TWD = ${{ steps.run_scraper.outputs.myr_twd }}" || exit 0
          git push
